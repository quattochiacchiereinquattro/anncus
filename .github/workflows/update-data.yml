name: Update ANNCSU Data

on:
  # schedule:
  #   - cron: '0 1 1,5,9,13,15 * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: "Forza il re-download anche se i dati sono aggiornati"
        type: boolean
        default: false
      skip_pmtiles:
        description: "Salta la conversione PMTiles"
        type: boolean
        default: false
      regenerate_boundaries:
        description: "Rigenera istat-boundaries.parquet anche se già presente"
        type: boolean
        default: false

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:

  check:
    name: "0 - Controlla file esistenti"
    runs-on: ubuntu-latest
    outputs:
      boundaries_exists: ${{ steps.check-boundaries.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Controlla se istat-boundaries.parquet esiste
        id: check-boundaries
        run: |
          if [ -f data/istat-boundaries.parquet ] && \
             [ "${{ inputs.regenerate_boundaries }}" != "true" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "istat-boundaries.parquet trovato, salto la rigenerazione"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "istat-boundaries.parquet non trovato (o rigenerazione forzata)"
          fi

      - name: Upload istat-boundaries.parquet esistente
        if: steps.check-boundaries.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: istat-boundaries
          path: data/istat-boundaries.parquet
          retention-days: 1

  generate-comuni:
    name: "1a - Genera comuni.json"
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Genera comuni.json
        run: uv run scripts/generate_comuni.py

      - name: Upload comuni.json
        uses: actions/upload-artifact@v4
        with:
          name: comuni-json
          path: data/comuni.json
          retention-days: 1

  generate-boundaries:
    name: "1b - Genera istat-boundaries.parquet"
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.boundaries_exists == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Genera istat-boundaries.parquet
        run: uv run scripts/generate_boundaries.py

      - name: Upload istat-boundaries.parquet
        uses: actions/upload-artifact@v4
        with:
          name: istat-boundaries
          path: data/istat-boundaries.parquet
          retention-days: 1

  update-data:
    name: "2 - Aggiorna dati ANNCSU"
    runs-on: ubuntu-latest
    needs: [generate-comuni, generate-boundaries]
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Installa tippecanoe
        if: ${{ !inputs.skip_pmtiles }}
        run: sudo apt-get install -y tippecanoe

      - name: Download comuni.json
        uses: actions/download-artifact@v4
        with:
          name: comuni-json
          path: data/

      - name: Download istat-boundaries.parquet
        uses: actions/download-artifact@v4
        with:
          name: istat-boundaries
          path: data/

      - name: Ripristina marker data precedente
        uses: actions/cache@v4
        with:
          path: data/.last_remote_date
          key: anncsu-date-marker-${{ runner.os }}

      - name: Aggiorna dati ANNCSU
        run: |
          ARGS=""
          [ "${{ inputs.force }}" = "true" ]        && ARGS="$ARGS --force"
          [ "${{ inputs.skip_pmtiles }}" = "true" ] && ARGS="$ARGS --skip-pmtiles"
          uv run scripts/update_data.py $ARGS

      - name: Salva marker data dataset
        uses: actions/cache@v4
        with:
          path: data/.last_remote_date
          key: anncsu-date-marker-${{ runner.os }}

      - name: Commit comuni.json e marker data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/comuni.json \
                  data/.last_remote_date
          git diff --cached --quiet || \
            git commit -m "chore(data): aggiornamento dati ANNCSU $(date -u +%Y-%m-%d)"
          git push

      - name: Installa lftp
        run: sudo apt-get install -y lftp

      - name: Carica parquet e comuni.json su FTP
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" ftp.gbvitrano.it << 'FTPEOF'
          set ssl:verify-certificate false
          set ftp:passive-mode true
          mkdir -p /public_html/anncus/data
          put data/comuni.json -o /public_html/anncus/data/comuni.json
          put data/anncsu-indirizzi.parquet -o /public_html/anncus/data/anncsu-indirizzi.parquet
          put data/istat-boundaries.parquet -o /public_html/anncus/data/istat-boundaries.parquet
          bye
          FTPEOF

      - name: Carica PMTiles su FTP
        if: ${{ !inputs.skip_pmtiles }}
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" ftp.gbvitrano.it << 'FTPEOF'
          set ssl:verify-certificate false
          set ftp:passive-mode true
          put data/anncsu-indirizzi.pmtiles -o /public_html/anncus/data/anncsu-indirizzi.pmtiles
          bye
          FTPEOF
